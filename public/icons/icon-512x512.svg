<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Calculator body -->
    <rect x="-128" y="-150" width="256" height="300" rx="20" fill="white" opacity="0.95"/>
    <!-- Screen -->
    <rect x="-108" y="-130" width="216" height="76" rx="10" fill="#1e40af"/>
    <text x="88" y="-80" fill="white" font-family="Arial,sans-serif" font-size="42" font-weight="bold" text-anchor="end">RON</text>
    <!-- Buttons row 1 -->
    <rect x="-108" y="-36" width="48" height="48" rx="8" fill="#dbeafe"/>
    <rect x="-50" y="-36" width="48" height="48" rx="8" fill="#dbeafe"/>
    <rect x="8" y="-36" width="48" height="48" rx="8" fill="#dbeafe"/>
    <rect x="66" y="-36" width="48" height="48" rx="8" fill="#3b82f6"/>
    <!-- Buttons row 2 -->
    <rect x="-108" y="22" width="48" height="48" rx="8" fill="#dbeafe"/>
    <rect x="-50" y="22" width="48" height="48" rx="8" fill="#dbeafe"/>
    <rect x="8" y="22" width="48" height="48" rx="8" fill="#dbeafe"/>
    <rect x="66" y="22" width="48" height="48" rx="8" fill="#3b82f6"/>
    <!-- Buttons row 3 -->
    <rect x="-108" y="80" width="48" height="48" rx="8" fill="#dbeafe"/>
    <rect x="-50" y="80" width="106" height="48" rx="8" fill="#2563eb"/>
    <rect x="66" y="80" width="48" height="48" rx="8" fill="#3b82f6"/>
  </g>
</svg>
