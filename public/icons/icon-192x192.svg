<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <g transform="translate(96,96)">
    <!-- Calculator body -->
    <rect x="-48" y="-56" width="96" height="112" rx="8" fill="white" opacity="0.95"/>
    <!-- Screen -->
    <rect x="-40" y="-48" width="80" height="28" rx="4" fill="#1e40af"/>
    <text x="32" y="-28" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold" text-anchor="end">RON</text>
    <!-- Buttons row 1 -->
    <rect x="-40" y="-12" width="18" height="18" rx="3" fill="#dbeafe"/>
    <rect x="-18" y="-12" width="18" height="18" rx="3" fill="#dbeafe"/>
    <rect x="4" y="-12" width="18" height="18" rx="3" fill="#dbeafe"/>
    <rect x="26" y="-12" width="18" height="18" rx="3" fill="#3b82f6"/>
    <!-- Buttons row 2 -->
    <rect x="-40" y="10" width="18" height="18" rx="3" fill="#dbeafe"/>
    <rect x="-18" y="10" width="18" height="18" rx="3" fill="#dbeafe"/>
    <rect x="4" y="10" width="18" height="18" rx="3" fill="#dbeafe"/>
    <rect x="26" y="10" width="18" height="18" rx="3" fill="#3b82f6"/>
    <!-- Buttons row 3 -->
    <rect x="-40" y="32" width="18" height="18" rx="3" fill="#dbeafe"/>
    <rect x="-18" y="32" width="40" height="18" rx="3" fill="#2563eb"/>
  </g>
</svg>
